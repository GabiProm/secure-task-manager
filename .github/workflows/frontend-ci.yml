name: CI Frontend - Build & Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Login a Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Definir versión (SHA corto)
      - name: Set image version
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      # 4️⃣ Build de la imagen frontend (con build-arg)
      - name: Build frontend Docker image (versioned)
        run: |
          docker build \
            --build-arg VITE_API_URL=http://localhost:3000 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/stm-frontend:${{ env.IMAGE_TAG }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/stm-frontend:latest \
            ./frontend

      # 5️⃣ Push a Docker Hub
      - name: Push frontend Docker images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/stm-frontend:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/stm-frontend:latest