name: CI Backend - Build, Scan & Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - backend/**
  workflow_dispatch:

jobs:
  build-scan-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Login a Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Definir versión de la imagen (SHA corto)
      - name: Set image version
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      # 4️⃣ Build de la imagen con DOS tags
      - name: Build Docker image (versioned)
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/stm-backend:${{ env.IMAGE_TAG }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/stm-backend:latest \
            ./backend

      # 5️⃣ Escaneo de seguridad con Trivy (DevSecOps)
      - name: 🛡️ Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/stm-backend:${{ env.IMAGE_TAG }}
          format: table
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      # 6️⃣ PUSH REAL A DOCKER HUB (LO QUE FALTABA 🔥)
      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/stm-backend:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/stm-backend:latest
