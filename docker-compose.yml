version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: stm-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  backend:
    image: henryggg/stm-backend:latest
    container_name: stm-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:3000"
    depends_on:
      - db


  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000
    container_name: stm-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend


volumes:
  postgres_data:

